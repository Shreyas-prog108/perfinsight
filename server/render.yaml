# Render Blueprint — monorepo API + static SPA
# Dashboard: Blueprint file path must be server/render.yaml (connect Git repo at monorepo root).
# Docs: https://render.com/docs/infrastructure-as-code
#
# API Docker build: rootDir MUST be server so Dockerfile Path ./Dockerfile resolves to server/Dockerfile
# (Otherwise Render defaults to repo-root Dockerfile and the build fails with "Dockerfile not found").
#
# Secrets (Dashboard, sync:false): API — MONGODB_URI, JWT_SECRET, OPENAI_API_KEY
# Static build — VITE_API_URL = API origin HTTPS only (no /api suffix), e.g. https://perfinsight-api.onrender.com
# Deploy API first, paste URL into perfinsight-web env, redeploy frontend.

services:
  - type: web
    name: perfinsight-api
    runtime: docker
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: perfinsight-web
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
