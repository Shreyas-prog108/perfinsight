# Pings PerfInsight on Render on a fixed schedule so the free Web Service stays warm more often.
# Schedule runs in UTC. GitHub may delay workflows slightly under load.
name: Render keepalive ping

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health
        run: |
          curl -fsS \
            --connect-timeout 15 \
            --max-time 120 \
            "https://perfinsight.onrender.com/health"
